<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — ElectroVote</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-bg">
    <header class="nav">
      <div class="container nav-inner">
        <a href="/admin.html" class="brand"><span class="logo">▣</span> Electro<b>Vote</b></a>
        <nav class="nav-links">
          <a href="/admin.html">Dashboard</a>
        </nav>
        <div class="nav-actions">
          <span class="badge badge-voted" id="adminChip">Admin</span>
          <button class="btn btn-outline btn-sm" onclick="doLogout()">Log out</button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="container">
        <div class="page-head">
          <div>
            <h1>Admin dashboard</h1>
            <p>Manage elections, candidates and monitor live voting statistics.</p>
          </div>
          <button class="btn btn-primary" id="newElectionBtn">＋ New election</button>
        </div>

        <div class="stat-grid" id="stats">
          <div class="stat-card"><div class="ic">👥</div><div class="val" id="sStudents">—</div><div class="lbl">Registered students</div></div>
          <div class="stat-card"><div class="ic">🗳️</div><div class="val" id="sElections">—</div><div class="lbl">Total elections</div></div>
          <div class="stat-card"><div class="ic">🟢</div><div class="val" id="sActive">—</div><div class="lbl">Active elections</div></div>
          <div class="stat-card"><div class="ic">📈</div><div class="val" id="sVotes">—</div><div class="lbl">Total votes cast</div></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h3>Elections</h3>
            <span class="muted" style="font-size:13.5px">Open, close and manage candidates</span>
          </div>
          <div id="electionsList"><div class="spinner"></div></div>
        </div>
      </div>
    </main>

    <!-- Election modal -->
    <div class="modal-backdrop" id="electionModal">
      <div class="modal">
        <div class="modal-head">
          <h3 id="electionModalTitle">New election</h3>
          <button class="x" data-close>×</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="electionId" />
          <div class="field">
            <label for="eTitle">Title</label>
            <input class="input" id="eTitle" placeholder="e.g. Students' Union President 2025" />
          </div>
          <div class="field">
            <label for="eDesc">Description</label>
            <textarea class="textarea" id="eDesc" placeholder="Short summary of this election"></textarea>
          </div>
          <div class="field">
            <label for="eStatus">Status</label>
            <select class="select" id="eStatus">
              <option value="draft">Draft — hidden from students</option>
              <option value="active">Active — open for voting</option>
              <option value="closed">Closed — results only</option>
            </select>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" data-close>Cancel</button>
          <button class="btn btn-primary" id="saveElection">Save election</button>
        </div>
      </div>
    </div>

    <!-- Candidate modal -->
    <div class="modal-backdrop" id="candidateModal">
      <div class="modal">
        <div class="modal-head">
          <h3 id="candidateModalTitle">Add candidate</h3>
          <button class="x" data-close>×</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="candidateId" />
          <input type="hidden" id="candidateElectionId" />
          <div class="field">
            <label for="cName">Full name</label>
            <input class="input" id="cName" placeholder="e.g. Grace Adeyemi" />
          </div>
          <div class="field">
            <label for="cPosition">Position</label>
            <input class="input" id="cPosition" placeholder="e.g. President" />
          </div>
          <div class="field">
            <label for="cManifesto">Manifesto</label>
            <textarea class="textarea" id="cManifesto" placeholder="What does this candidate stand for?"></textarea>
          </div>
          <div class="field">
            <label for="cPhoto">Photo URL <span class="muted">(optional)</span></label>
            <input class="input" id="cPhoto" placeholder="https://…" />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" data-close>Cancel</button>
          <button class="btn btn-primary" id="saveCandidate">Save candidate</button>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
